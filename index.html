<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Ohenro OS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Noto Serif JP', serif; }
  </style>
</head>
<body class="m-0 p-0">

  <!-- 背景・共通コンテナ -->
  <section
    class="relative w-screen min-h-screen"
    style="
      background-image: url('assets/images/hero-bg.png');
      background-size: cover;
      background-position: center;
    "
  >
    <!-- オーバーレイ -->
    <div class="absolute inset-0 bg-black/50"></div>

    <!-- 言語切替（全画面共通） -->
    <div
      class="absolute right-4 z-20 flex items-center bg-white/25 backdrop-blur-sm rounded-full tracking-widest"
      style="top: calc(env(safe-area-inset-top) + 1rem);"
    >
      <button id="btn-ja" onclick="setLanguage('ja')" class="px-4 py-2 rounded-full transition-opacity flex flex-col items-center gap-0.5">
        <span class="text-xl leading-none">🇯🇵</span>
        <span class="text-xs font-semibold">JP</span>
      </button>
      <span class="text-black/25 text-sm select-none">|</span>
      <button id="btn-en" onclick="setLanguage('en')" class="px-4 py-2 rounded-full transition-opacity flex flex-col items-center gap-0.5">
        <span class="text-xl leading-none">🇺🇸</span>
        <span class="text-xs font-semibold">EN</span>
      </button>
    </div>

    <!-- ── Welcome画面 ── -->
    <div
      id="screen-welcome"
      class="absolute inset-0 flex flex-col items-center justify-center gap-8 px-6 text-center"
    >
      <!-- 現在地 -->
      <div class="border border-white/40 bg-white/10 text-white/80 text-xs tracking-[0.25em] px-5 py-2 rounded-full backdrop-blur-sm">
        <span id="location"></span>
      </div>

      <!-- タイトル -->
      <div class="flex flex-col items-center gap-2">
        <h1 id="title" class="text-white text-4xl font-semibold tracking-[0.2em]"></h1>
        <p id="subtitle" class="text-white/50 text-xs tracking-[0.3em] uppercase"></p>
      </div>

      <!-- キャッチコピー -->
      <p id="catch" class="text-white text-2xl font-light tracking-wider leading-relaxed"></p>

      <!-- CTA -->
      <button
        id="cta"
        onclick="goToInn()"
        class="w-72 bg-red-600 hover:bg-red-700 active:bg-red-800 text-white text-lg font-semibold tracking-widest py-5 rounded-full shadow-2xl transition-colors duration-150"
      ></button>
    </div>

    <!-- ── 宿選択画面 ── -->
    <div
      id="screen-inn"
      class="absolute inset-0 flex-col overflow-y-auto px-6 pt-16 pb-10"
      style="display: none;"
    >
      <div class="relative z-10 flex flex-col gap-6 max-w-sm mx-auto w-full">

        <!-- 戻るボタン -->
        <button
          id="inn-back"
          onclick="goBack()"
          class="self-start text-white/70 text-sm tracking-widest hover:text-white transition-colors"
        ></button>

        <!-- タイトル -->
        <h2
          id="inn-title"
          class="text-white text-2xl font-semibold tracking-wider"
        ></h2>

        <!-- 宿カード一覧 -->
        <div id="inn-list" class="flex flex-col gap-4"></div>

      </div>
    </div>

    <!-- ── 体験（クーポン）一覧画面 ── -->
    <div
      id="screen-experience"
      class="absolute inset-0 flex-col overflow-y-auto px-6 pt-16 pb-10"
      style="display: none;"
    >
      <div class="relative z-10 flex flex-col gap-6 max-w-sm mx-auto w-full">

        <!-- 戻るボタン -->
        <button
          id="exp-back"
          onclick="goBack()"
          class="self-start text-white/70 text-sm tracking-widest hover:text-white transition-colors"
        ></button>

        <!-- タイトル -->
        <h2
          id="exp-title"
          class="text-white text-2xl font-semibold tracking-wider"
        ></h2>

        <!-- クーポンカード一覧 -->
        <div id="exp-list" class="flex flex-col gap-4"></div>

      </div>
    </div>

    <!-- ── チケット表示画面 ── -->
    <div
      id="screen-ticket"
      class="absolute inset-0 flex-col overflow-y-auto px-6 pt-16 pb-10"
      style="display: none;"
    >
      <div class="relative z-10 flex flex-col gap-6 max-w-sm mx-auto w-full">

        <!-- 戻るボタン -->
        <button
          id="ticket-back"
          onclick="goBack()"
          class="self-start text-white/70 text-sm tracking-widest hover:text-white transition-colors"
        ></button>

        <!-- クーポン情報 -->
        <div class="bg-white/15 backdrop-blur-sm border border-white/20 rounded-3xl px-6 py-6 flex flex-col gap-3">
          <h2 id="ticket-title" class="text-white text-xl font-semibold tracking-wide leading-snug"></h2>
          <p  id="ticket-desc"  class="text-white/70 text-sm leading-relaxed"></p>
        </div>

        <!-- 指差しフレーズ -->
        <div id="phrase-list" class="grid grid-cols-2 gap-3"></div>

        <!-- CTA -->
        <button
          id="ticket-cta"
          onclick="useTicket()"
          class="w-full bg-red-600 hover:bg-red-700 active:bg-red-800 text-white text-lg font-semibold tracking-widest py-5 rounded-full shadow-2xl transition-colors duration-150 mt-2"
        ></button>

      </div>
    </div>

    <!-- ── 属性入力画面 ── -->
    <div
      id="screen-form"
      class="absolute inset-0 flex-col overflow-y-auto px-6 pt-16 pb-10"
      style="display: none;"
    >
      <div class="relative z-10 flex flex-col gap-6 max-w-sm mx-auto w-full">

        <!-- 戻るボタン -->
        <button
          id="form-back"
          onclick="goBack()"
          class="self-start text-white/70 text-sm tracking-widest hover:text-white transition-colors"
        ></button>

        <!-- タイトル -->
        <h2 id="form-title" class="text-white text-2xl font-semibold tracking-wider"></h2>

        <!-- Region -->
        <div class="flex flex-col gap-3">
          <p class="text-white/60 text-xs tracking-widest uppercase">Region</p>
          <div id="region-group" class="grid grid-cols-2 gap-3"></div>
        </div>

        <!-- Country（JSで表示制御） -->
        <div id="country-section" class="flex flex-col gap-3" style="display: none;">
          <p class="text-white/60 text-xs tracking-widest uppercase">Country</p>
          <div id="country-group" class="grid grid-cols-2 gap-3"></div>
        </div>

        <!-- Age -->
        <div class="flex flex-col gap-3">
          <p class="text-white/60 text-xs tracking-widest uppercase">Age</p>
          <div id="age-group" class="grid grid-cols-5 gap-2"></div>
        </div>

        <!-- Gender -->
        <div class="flex flex-col gap-3">
          <p class="text-white/60 text-xs tracking-widest uppercase">Gender</p>
          <div id="gender-group" class="grid grid-cols-2 gap-3"></div>
        </div>

        <!-- Submit CTA -->
        <button
          id="form-cta"
          onclick="submitForm()"
          class="w-full bg-red-600 hover:bg-red-700 active:bg-red-800 text-white text-lg font-semibold tracking-widest py-5 rounded-full shadow-2xl transition-colors duration-150 mt-2"
        ></button>

      </div>
    </div>

    <!-- ── 完了画面 ── -->
    <div
      id="screen-done"
      class="absolute inset-0 flex-col items-center justify-center px-6 text-center gap-6"
      style="display: none;"
    >
      <div class="relative z-10 flex flex-col items-center gap-5">
        <h2 id="done-title" class="text-white text-3xl font-semibold tracking-wider"></h2>
        <p  id="done-msg"   class="text-white/60 text-base tracking-wide"></p>
        <button
          id="done-home"
          onclick="resetToWelcome()"
          class="border border-white/30 text-white/50 text-sm tracking-widest px-8 py-3 rounded-full hover:text-white/80 transition-colors"
        ></button>
      </div>
    </div>

    <!-- ── ダッシュボード画面 ── -->
    <div
      id="screen-dashboard"
      class="relative flex-col px-6 pt-16 pb-10"
      style="display: none;"
    >
      <div class="flex flex-col gap-4 max-w-sm mx-auto w-full">

        <!-- 戻るボタン -->
        <button
          id="dash-back"
          onclick="goBack()"
          class="self-start text-white/70 text-sm tracking-widest hover:text-white transition-colors mb-2"
        ></button>

        <!-- ① 人の流れ -->
        <div class="bg-white/10 backdrop-blur-sm border border-white/20 rounded-2xl px-5 py-5">
          <div id="dash-flow"></div>
        </div>

        <!-- ② 宿ランキング -->
        <div class="bg-white/10 backdrop-blur-sm border border-white/20 rounded-2xl px-5 py-5 flex flex-col gap-3">
          <div id="dash-inns-ranking" class="flex flex-col gap-3"></div>
        </div>

        <!-- ③ 属性 -->
        <div class="bg-white/10 backdrop-blur-sm border border-white/20 rounded-2xl px-5 py-5">
          <div id="dash-attr"></div>
        </div>

        <!-- ④ ルートランキング -->
        <div class="bg-white/10 backdrop-blur-sm border border-white/20 rounded-2xl px-5 py-5 flex flex-col gap-3">
          <div id="dash-routes" class="flex flex-col gap-3"></div>
        </div>

        <!-- ⑤ インサイト -->
        <div id="dash-insight"></div>

      </div>
    </div>

  </section>

  <script src="config/config.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
