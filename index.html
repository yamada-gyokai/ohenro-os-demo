<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>お遍路OS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Noto Serif JP', serif; }
  </style>
</head>
<body class="m-0 p-0 overflow-hidden">

  <section
    class="relative w-screen h-screen flex flex-col items-center justify-center gap-10 px-6"
    style="
      background-image: url('assets/images/hero-bg.png');
      background-size: cover;
      background-position: center;
    "
  >
    <!-- オーバーレイ -->
    <div class="absolute inset-0 bg-black/50"></div>

    <!-- コンテンツ -->
    <div class="relative z-10 flex flex-col items-center gap-8 text-center">

      <!-- 現在地 -->
      <div class="border border-white/40 bg-white/10 text-white/80 text-xs tracking-[0.25em] px-5 py-2 rounded-full backdrop-blur-sm">
        第 45 番　岩屋寺
      </div>

      <!-- タイトル -->
      <div class="flex flex-col items-center gap-2">
        <h1 class="text-white text-4xl font-semibold tracking-[0.2em]">お遍路OS</h1>
        <p class="text-white/50 text-xs tracking-[0.3em] uppercase">Your Stay, Your Local Story</p>
      </div>

      <!-- キャッチコピー -->
      <p class="text-white text-2xl font-light tracking-wider leading-relaxed">
        今夜の宿を、選ぼう。
      </p>

      <!-- CTA -->
      <button
        class="mt-2 w-72 bg-red-600 hover:bg-red-700 active:bg-red-800 text-white text-lg font-semibold tracking-widest py-5 rounded-full shadow-2xl transition-colors duration-150"
      >
        宿を選ぶ / Choose your stay
      </button>

    </div>
  </section>

</body>
</html>
